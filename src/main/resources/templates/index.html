<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>TaskMngr</title>
</head>
<body>
    <h1>Mój Task Manager</h1>

    <form action="/add" method="post">
        <input type="text" name="description" placeholder="Co jest do zrobienia?" required>
        <button type="submit">Dodaj zadanie</button>
    </form>

    <hr>

    <ul>
        <li th:each="task : ${tasks}">
            <span th:text="${task.description}"></span>
        </li>
    </ul>

</body>
</html>
